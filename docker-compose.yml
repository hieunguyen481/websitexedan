services:
  postgres:
    image: postgres:16-alpine
    container_name: xedan-postgres
    environment:
      POSTGRES_USER: xedan
      POSTGRES_PASSWORD: xedan
      POSTGRES_DB: xedanvoidan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xedan-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
